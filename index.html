<!DOCTYPE html>
<html>
<head>
<title>Media Portal</title>
</head>
<body>
<h1>Content is loading...</h1>
<script>
// Этот JS нужен, чтобы реальный юзер, если вдруг попадет сюда из поиска,
// автоматически перенаправлялся на твой реальный сайт
const urlParams = new URLSearchParams(window.location.search);
const pageId = urlParams.get('id');

if (pageId) {
    // Убираем id, оставляем остальные параметры
    urlParams.delete('id');
    const extraParams = urlParams.toString();
    
    let redirectUrl = "https://temptopals.garden/join/channel/" + pageId;
    if (extraParams) {
        redirectUrl += "?" + extraParams;
    }
    
    window.location.href = redirectUrl;
}
</script>
</body>
</html>
