name: Parser

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'  # каждые 6 часов

jobs:
  parse:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: pip install feedparser beautifulsoup4
      
      - name: Run parser
        run: python parser.py
      
      - name: Save results
        run: |
          git config user.email "bot@bot.com"
          git config user.name "Bot"
          git add .
          git diff --staged --quiet || git commit -m "update data"
          git push
